spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/budowy
    username: postgres
    password: haslo
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6

jwt:
  secret: ${JWT_SECRET:zmien-ten-sekret-w-produkcji-min64znaki-lorem-ipsum-dolor-sit-amet}
  expiration-ms: 86400000

server:
  port: 8080

logging:
  level:
    com.coass: DEBUG
    org.flywaydb: INFO
