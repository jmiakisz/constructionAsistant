spring:
  config:
    import: optional:file:./application-local.yml
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  datasource:
    url: jdbc:postgresql://localhost:5433/budowy
    username: postgres
    password: haslo
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

anthropic:
  api-key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-6
  model-chat: claude-haiku-4-5-20251001
  model-extraction: claude-haiku-4-5-20251001

jwt:
  secret: ${JWT_SECRET:zmien-ten-sekret-w-produkcji-min64znaki-lorem-ipsum-dolor-sit-amet}
  expiration-ms: 604800000  # 7 dni

server:
  port: 8080

app:
  upload-dir: uploads
  ai:
    provider: anthropic  # anthropic | openai

logging:
  file:
    name: logs/coass.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    com.coass: DEBUG
    org.flywaydb: INFO
    org.hibernate.SQL: INFO
